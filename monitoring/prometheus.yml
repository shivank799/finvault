global:
  scrape_interval:     15s
  evaluation_interval: 15s
  external_labels:
    cluster: 'finvault-prod'
    env:     'production'

alerting:
  alertmanagers:
    - static_configs:
        - targets: []

rule_files:
  - "alerts/*.yml"

scrape_configs:
  # ── FinVault Backend API ──────────────────────────────────────
  - job_name: 'finvault-backend'
    static_configs:
      - targets: ['backend:5000']
    metrics_path: /metrics
    scheme: http
    scrape_interval: 15s
    scrape_timeout:  10s

  # ── Nginx ─────────────────────────────────────────────────────
  - job_name: 'nginx'
    static_configs:
      - targets: ['nginx:9113']

  # ── PostgreSQL ────────────────────────────────────────────────
  - job_name: 'postgres'
    static_configs:
      - targets: ['postgres-exporter:9187']

  # ── Redis ─────────────────────────────────────────────────────
  - job_name: 'redis'
    static_configs:
      - targets: ['redis-exporter:9121']

  # ── Prometheus self-monitoring ────────────────────────────────
  - job_name: 'prometheus'
    static_configs:
      - targets: ['localhost:9090']

  # ── Node Exporter (host metrics) ─────────────────────────────
  - job_name: 'node-exporter'
    static_configs:
      - targets: ['node-exporter:9100']
