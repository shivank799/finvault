server {
    listen 80;
    server_name finvault.local localhost;

    # Redirect HTTP → HTTPS in production (uncomment when SSL ready)
    # return 301 https://$host$request_uri;

    # ── Security headers ─────────────────────────────────────────
    add_header X-Frame-Options           "SAMEORIGIN"              always;
    add_header X-Content-Type-Options    "nosniff"                 always;
    add_header X-XSS-Protection          "1; mode=block"           always;
    add_header Referrer-Policy           "strict-origin-when-cross-origin" always;
    add_header Permissions-Policy        "camera=(), microphone=(), geolocation=()" always;
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;

    # ── API Proxy ────────────────────────────────────────────────
    location /api/ {
        limit_req zone=api burst=20 nodelay;
        limit_conn conn_limit 20;

        proxy_pass         http://backend_api;
        proxy_http_version 1.1;
        proxy_set_header   Upgrade          $http_upgrade;
        proxy_set_header   Connection       "upgrade";
        proxy_set_header   Host             $host;
        proxy_set_header   X-Real-IP        $remote_addr;
        proxy_set_header   X-Forwarded-For  $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_set_header   X-Request-ID     $request_id;

        proxy_connect_timeout  10s;
        proxy_send_timeout     30s;
        proxy_read_timeout     30s;

        # Circuit breaker behavior
        proxy_next_upstream error timeout http_502 http_503 http_504;
        proxy_next_upstream_tries 2;

        # Cache headers
        proxy_cache_bypass $http_pragma;
        proxy_no_cache     $http_pragma;
    }

    # Auth endpoint — stricter rate limit
    location /api/auth/ {
        limit_req zone=auth burst=5 nodelay;
        proxy_pass http://backend_api;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    }

    # ── Metrics (internal only) ──────────────────────────────────
    location /metrics {
        allow 172.20.0.0/16;   # Docker network only
        deny  all;
        proxy_pass http://backend_api/metrics;
    }

    # ── Health check ─────────────────────────────────────────────
    location /health {
        access_log off;
        proxy_pass http://backend_api/api/health;
    }

    # ── Frontend ─────────────────────────────────────────────────
    location / {
        proxy_pass         http://frontend_app;
        proxy_http_version 1.1;
        proxy_set_header   Host             $host;
        proxy_set_header   X-Real-IP        $remote_addr;
        proxy_set_header   X-Forwarded-For  $proxy_add_x_forwarded_for;
        proxy_cache_bypass $http_upgrade;
    }
}

