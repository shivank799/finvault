name: FinVault CI/CD Pipeline

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]
  workflow_dispatch:
    inputs:
      environment:
        description: 'Target environment'
        required: true
        default: 'staging'
        type: choice
        options: [staging, production]

# Cancel in-progress runs on the same branch
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  REGISTRY:      ghcr.io
  ORG:           ${{ github.repository_owner }}
  IMAGE_BACKEND: ghcr.io/${{ github.repository_owner }}/finvault-backend
  IMAGE_FRONTEND: ghcr.io/${{ github.repository_owner }}/finvault-frontend

jobs:
  # ─────────────────────────────────────────────────────────
  # JOB 1: Code Quality — Lint & Test Backend
  # ─────────────────────────────────────────────────────────
  test-backend:
    name: 🧪 Backend — Lint & Test
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend

    services:
      postgres:
        image: postgres:15-alpine
        env:
          POSTGRES_DB:       finvault_test
          POSTGRES_USER:     test_user
          POSTGRES_PASSWORD: test_secret
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports: ['5432:5432']

      redis:
        image: redis:7-alpine
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports: ['6379:6379']

    steps:
      - name: ⬇️ Checkout
        uses: actions/checkout@v4

      - name: 🟢 Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: backend/package-lock.json

      - name: 📦 Install dependencies
        run: npm ci

      - name: 🔍 Run ESLint
        run: npm run lint

      - name: 🧪 Run tests with coverage
        run: npm run test:ci
        env:
          NODE_ENV:       test
          DATABASE_URL:   postgresql://test_user:test_secret@localhost:5432/finvault_test
          REDIS_URL:      redis://localhost:6379
          JWT_SECRET:     test_jwt_secret_minimum_32_characters_long
          JWT_REFRESH_SECRET: test_refresh_secret_32_characters_long

      - name: 📊 Upload coverage report
        uses: codecov/codecov-action@v3
        with:
          flags: backend
          directory: backend/coverage

  # ─────────────────────────────────────────────────────────
  # JOB 2: Code Quality — Lint & Test Frontend
  # ─────────────────────────────────────────────────────────
  test-frontend:
    name: 🎨 Frontend — Lint & Test
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend

    steps:
      - name: ⬇️ Checkout
        uses: actions/checkout@v4

      - name: 🟢 Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: 📦 Install dependencies
        run: npm ci

      - name: 🔍 Run ESLint
        run: npm run lint --if-present

      - name: 🧪 Run tests
        run: npm run test:ci
        env:
          REACT_APP_API_URL: http://localhost:5000/api

  # ─────────────────────────────────────────────────────────
  # JOB 3: Security Scanning
  # ─────────────────────────────────────────────────────────
  security-scan:
    name: 🔐 Security Scan
    runs-on: ubuntu-latest
    needs: [test-backend, test-frontend]

    steps:
      - name: ⬇️ Checkout
        uses: actions/checkout@v4

      - name: 🔐 Run Trivy vulnerability scanner (filesystem)
        uses: aquasecurity/trivy-action@master
        with:
          scan-type:   fs
          scan-ref:    .
          severity:    CRITICAL,HIGH
          exit-code:   1
          ignore-unfixed: true

      - name: 📋 Run npm audit — Backend
        working-directory: backend
        run: npm audit --audit-level=high --production
        continue-on-error: true

      - name: 📋 Run npm audit — Frontend
        working-directory: frontend
        run: npm audit --audit-level=high --production
        continue-on-error: true

  # ─────────────────────────────────────────────────────────
  # JOB 4: Build & Push Docker Images
  # ─────────────────────────────────────────────────────────
  build-images:
    name: 🐳 Build & Push Images
    runs-on: ubuntu-latest
    needs: [test-backend, test-frontend]
    if: github.event_name != 'pull_request'
    outputs:
      backend-tag:  ${{ steps.meta-backend.outputs.tags }}
      frontend-tag: ${{ steps.meta-frontend.outputs.tags }}
      version:      ${{ steps.meta-backend.outputs.version }}

    steps:
      - name: ⬇️ Checkout
        uses: actions/checkout@v4

      - name: 🔧 Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
        with:
          platforms: linux/amd64,linux/arm64

      - name: 🔑 Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry:  ${{ env.REGISTRY }}
          username:  ${{ github.actor }}
          password:  ${{ secrets.GITHUB_TOKEN }}

      - name: 🏷️ Generate Backend metadata
        id: meta-backend
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.IMAGE_BACKEND }}
          tags: |
            type=ref,event=branch
            type=semver,pattern={{version}}
            type=sha,prefix=sha-,format=short
            type=raw,value=latest,enable=${{ github.ref == 'refs/heads/main' }}

      - name: 🏷️ Generate Frontend metadata
        id: meta-frontend
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.IMAGE_FRONTEND }}
          tags: |
            type=ref,event=branch
            type=semver,pattern={{version}}
            type=sha,prefix=sha-,format=short
            type=raw,value=latest,enable=${{ github.ref == 'refs/heads/main' }}

      - name: 🐳 Build & Push Backend image
        uses: docker/build-push-action@v5
        with:
          context:   backend
          file:      backend/Dockerfile
          target:    production
          push:      true
          tags:      ${{ steps.meta-backend.outputs.tags }}
          labels:    ${{ steps.meta-backend.outputs.labels }}
          platforms: linux/amd64,linux/arm64
          cache-from: type=gha,scope=backend
          cache-to:   type=gha,scope=backend,mode=max
          build-args: |
            BUILD_DATE=${{ github.event.head_commit.timestamp }}
            VCS_REF=${{ github.sha }}

      - name: 🐳 Build & Push Frontend image
        uses: docker/build-push-action@v5
        with:
          context:   frontend
          file:      frontend/Dockerfile
          target:    production
          push:      true
          tags:      ${{ steps.meta-frontend.outputs.tags }}
          labels:    ${{ steps.meta-frontend.outputs.labels }}
          platforms: linux/amd64,linux/arm64
          cache-from: type=gha,scope=frontend
          cache-to:   type=gha,scope=frontend,mode=max
          build-args: |
            REACT_APP_API_URL=${{ vars.REACT_APP_API_URL }}
            REACT_APP_ENV=production

      - name: 🔐 Scan Backend image with Trivy
        uses: aquasecurity/trivy-action@master
        with:
          image-ref:  ${{ env.IMAGE_BACKEND }}:latest
          format:     sarif
          output:     trivy-backend.sarif
          severity:   CRITICAL,HIGH

      - name: 📤 Upload Trivy scan results
        uses: github/codeql-action/upload-sarif@v3
        with:
          sarif_file: trivy-backend.sarif

  # ─────────────────────────────────────────────────────────
  # JOB 5: Deploy to Staging
  # ─────────────────────────────────────────────────────────
  deploy-staging:
    name: 🚀 Deploy → Staging
    runs-on: ubuntu-latest
    needs: [build-images, security-scan]
    if: github.ref == 'refs/heads/develop'
    environment:
      name: staging
      url:  https://staging.finvault.yourdomain.com

    steps:
      - name: ⬇️ Checkout
        uses: actions/checkout@v4

      - name: ☸️ Set up kubectl
        uses: azure/setup-kubectl@v3
        with:
          version: v1.29.0

      - name: 🔑 Configure kubeconfig
        run: |
          mkdir -p ~/.kube
          echo "${{ secrets.KUBE_CONFIG_STAGING }}" | base64 -d > ~/.kube/config
          chmod 600 ~/.kube/config

      - name: ☸️ Deploy to staging namespace
        run: |
          export IMAGE_TAG=sha-$(echo ${{ github.sha }} | cut -c1-7)

          # Patch image tags
          kubectl set image deployment/backend  backend=${{ env.IMAGE_BACKEND }}:$IMAGE_TAG  -n finvault-staging
          kubectl set image deployment/frontend frontend=${{ env.IMAGE_FRONTEND }}:$IMAGE_TAG -n finvault-staging

          # Wait for rollout
          kubectl rollout status deployment/backend  -n finvault-staging --timeout=300s
          kubectl rollout status deployment/frontend -n finvault-staging --timeout=300s

      - name: 🧪 Run smoke tests
        run: |
          sleep 15
          curl -f https://staging.finvault.yourdomain.com/api/health || exit 1

      - name: 📣 Notify Slack on success
        if: success()
        uses: slackapi/slack-github-action@v1.25.0
        with:
          payload: |
            {"text": "✅ *FinVault* staging deploy successful — `${{ github.sha }}` by @${{ github.actor }}"}
        env:
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK }}

  # ─────────────────────────────────────────────────────────
  # JOB 6: Deploy to Production (with approval gate)
  # ─────────────────────────────────────────────────────────
  deploy-production:
    name: 🚀 Deploy → Production
    runs-on: ubuntu-latest
    needs: [build-images, security-scan]
    if: github.ref == 'refs/heads/main'
    environment:
      name: production
      url:  https://finvault.yourdomain.com

    steps:
      - name: ⬇️ Checkout
        uses: actions/checkout@v4

      - name: ☸️ Set up kubectl
        uses: azure/setup-kubectl@v3
        with:
          version: v1.29.0

      - name: 🔑 Configure kubeconfig
        run: |
          mkdir -p ~/.kube
          echo "${{ secrets.KUBE_CONFIG_PROD }}" | base64 -d > ~/.kube/config
          chmod 600 ~/.kube/config

      - name: ☸️ Apply K8s manifests
        run: |
          kubectl apply -f k8s/ --namespace=finvault

      - name: 🐳 Update image tags — rolling deploy
        run: |
          export IMAGE_TAG=sha-$(echo ${{ github.sha }} | cut -c1-7)
          kubectl set image deployment/backend  backend=${{ env.IMAGE_BACKEND }}:$IMAGE_TAG  -n finvault
          kubectl set image deployment/frontend frontend=${{ env.IMAGE_FRONTEND }}:$IMAGE_TAG -n finvault

      - name: ⏳ Wait for rollout
        run: |
          kubectl rollout status deployment/backend  -n finvault --timeout=300s
          kubectl rollout status deployment/frontend -n finvault --timeout=300s

      - name: 🧪 Production smoke test
        run: |
          sleep 20
          curl -f https://finvault.yourdomain.com/api/health || exit 1
          echo "✅ Production health check passed"

      - name: 🏷️ Create GitHub Release
        uses: actions/create-release@v1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tag_name:     v${{ github.run_number }}
          release_name: "Release v${{ github.run_number }}"
          body: |
            ## 🚀 FinVault v${{ github.run_number }}
            **Deployed:** ${{ github.event.head_commit.timestamp }}
            **Commit:**   ${{ github.sha }}
            **Author:**   ${{ github.actor }}
          draft: false
          prerelease: false

      - name: ⏮️ Rollback on failure
        if: failure()
        run: |
          echo "Deployment failed — rolling back..."
          kubectl rollout undo deployment/backend  -n finvault
          kubectl rollout undo deployment/frontend -n finvault
          kubectl rollout status deployment/backend  -n finvault --timeout=120s

      - name: 📣 Notify Slack
        if: always()
        uses: slackapi/slack-github-action@v1.25.0
        with:
          payload: |
            {"text": "${{ job.status == 'success' && '✅' || '❌' }} *FinVault Production* deploy `${{ job.status }}` — `${{ github.sha }}`"}
        env:
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK }}
